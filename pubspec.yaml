name: mgw_eva
description: "Offline EVA-inspired battle planning app built with Flutter."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  collection: ^1.19.1
  cupertino_icons: ^1.0.8
  drift: ^2.28.2
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  flutter_svg: ^2.2.0
  freezed_annotation: ^3.0.0
  go_router: ^16.0.0
  json_annotation: ^4.9.0
  path: ^1.9.1
  path_provider: ^2.1.5
  riverpod_annotation: ^3.0.3
  sqlite3_flutter_libs: ^0.5.39

dev_dependencies:
  build_runner: ^2.7.1
  custom_lint: ^0.8.1
  drift_dev: ^2.28.2
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.0.6
  json_serializable: ^6.10.0
  riverpod_generator: ^3.0.3
  riverpod_lint: ^3.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/images/maps/atlantis/floor_1.png
    - assets/images/maps/atlantis/floor_2.png
    - assets/images/maps/helios/floor_1.png
    - assets/images/maps/helios/floor_2.png
    - assets/images/maps/the_cliff/floor_1.png
    - assets/images/maps/the_cliff/floor_2.png
    - assets/images/placeholders/
    - assets/images/weapons/
